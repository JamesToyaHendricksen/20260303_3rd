<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">ToDo List</h1>
        <a href="/todo/new" class="btn btn-primary">新規登録</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">ToDoを削除しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}">削除に失敗しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm" th:if="${#lists.isEmpty(todos)}">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-3">ToDoがまだ登録されていません</h2>
            <p class="text-muted mb-4">まずは新しいToDoを作成して、タスク管理を始めましょう。</p>
            <a href="/todo/new" class="btn btn-primary">新規作成</a>
        </div>
    </div>

    <div class="card shadow-sm" th:unless="${#lists.isEmpty(todos)}">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th scope="col" class="px-3">ID</th>
                    <th scope="col">タイトル</th>
                    <th scope="col" class="pe-3">完了状態</th>
                    <th scope="col" class="pe-3">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td class="px-3" th:text="${todo.id}">1</td>
                    <td>
                        <span th:text="${todo.title}" th:style="${todo.completed} ? 'text-decoration: line-through;' : ''">Sample title</span>
                    </td>
                    <td class="pe-3" th:text="${todo.completed} ? '完了' : '未完了'">未完了</td>
                    <td class="pe-3">
                        <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" class="d-inline me-1">
                            <button type="submit" class="btn btn-sm"
                                    th:classappend="${todo.completed} ? ' btn-outline-secondary' : ' btn-success'"
                                    th:text="${todo.completed} ? '未完了に戻す' : '完了にする'">完了にする</button>
                        </form>
                        <a th:href="@{/todo/{id}/edit(id=${todo.id})}" class="btn btn-outline-primary btn-sm me-1">編集</a>
                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('本当に削除しますか？');">
                            <button type="submit" class="btn btn-danger btn-sm">削除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
    setTimeout(function () {
        document.querySelectorAll('.alert').forEach(function (alertEl) {
            var bsAlert = bootstrap.Alert.getOrCreateInstance(alertEl);
            bsAlert.close();
        });
    }, 3000);
</script>
</body>
</html>
